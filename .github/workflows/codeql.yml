name: "CodeQL Advanced"

# Job names, step names, and matrix shape follow GitHub's canonical
# "CodeQL Advanced" Code Scanning template exactly. The Code Scanning UI
# registers configurations keyed off `(workflow_path, job_id, category)`
# tuples and shows status using template-default identifiers; deviating
# from those names produces orphan configuration cards in the UI that
# can't be cleaned up via API (PR-merge analyses are non-deletable).
#
# Three matrix entries cover the analysis categories CodeQL detects in this repo:
#   - actions             (source-only)
#   - java-kotlin         (GitHub's Kotlin analyzer identifier; manual Android Kotlin compile)
#   - javascript-typescript (source-only)
#
# This repo does not add an extra target or publish an Android artifact. The
# manual CodeQL build runs the Android Kotlin target because that KMP target
# emits bytecode the Kotlin extractor can analyze while preserving the KMP
# build shape.

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # Weekly periodic scan catches supply-chain CVEs that appear after merge.
  schedule:
    - cron: '44 16 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for SARIF upload
      security-events: write
      # required by codeql-action/analyze@v4 in private repos
      actions: read
      # required to fetch internal or private CodeQL packs from GHCR
      packages: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # JDK + Gradle setup only for the Kotlin analyzer bucket; the source-only
      # languages don't run any build at all.
      - name: Set up JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v6.1.0

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Restores+stores the CodeQL bundle and dependency cache between
          # runs. Default off in Advanced Setup; turning on cuts ~30-60s
          # off the init step on warm cache.
          dependency-caching: true

      # Manual build: compile the Android Kotlin target so CodeQL sees the
      # Kotlin bytecode Gradle already produces for this KMP project.
      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        run: |
          ./gradlew compileAndroidMain \
            --rerun-tasks \
            --no-build-cache \
            -Pkotlin.compiler.execution.strategy=out-of-process \
            --no-configuration-cache \
            --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
